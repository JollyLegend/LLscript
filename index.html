<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111318">
  <meta name="description" content="Responsive rehearsal script viewer for Lakers Lodge">
  <title>Lakers Lodge — Rehearsal Script</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;600;700;800&family=Lora:wght@400;600;700&family=Merriweather:wght@400;700&family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;600;700&family=Source+Code+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="title-block">
      <p class="eyebrow">REHEARSAL SCRIPT</p>
      <h1 id="script-title">Lakers Lodge</h1>
      <p id="script-meta" class="script-meta">Loading script…</p>
    </div>

    <button id="menu-toggle" class="icon-button menu-toggle" type="button"
            aria-expanded="false" aria-controls="controls-panel">
      Controls
    </button>
  </header>

  <section id="controls-panel" class="controls-panel" aria-label="Reading controls">
    <div class="control-group">
      <label for="scene-select">Jump to scene</label>
      <select id="scene-select">
        <option value="">Choose a scene…</option>
      </select>
    </div>

    <div class="control-group segmented" aria-label="Appearance">
      <button id="theme-toggle" type="button">Dark mode</button>
      <button id="directions-toggle" type="button" aria-pressed="false">Hide directions</button>
    </div>

    <div class="control-group">
      <label for="font-size">Text size</label>
      <input id="font-size" type="range" min="16" max="28" value="20" step="1">
    </div>

    <div class="control-group">
      <label for="font-family">Font</label>
      <select id="font-family">
        <option value="Courier Prime">Courier Prime</option>
        <option value="Roboto Mono">Roboto Mono</option>
        <option value="IBM Plex Mono">IBM Plex Mono</option>
        <option value="Source Code Pro">Source Code Pro</option>
        <option value="Inter">Inter</option>
        <option value="Roboto">Roboto</option>
        <option value="Lora">Lora</option>
        <option value="Merriweather">Merriweather</option>
      </select>
    </div>

    <div class="control-group character-controls" aria-label="Character highlighting">
      <span class="control-label">Line focus</span>
      <button class="character-filter leon-filter" data-character="LEON" type="button" aria-pressed="false">
        Leon
      </button>
      <button class="character-filter jane-filter" data-character="JANE" type="button" aria-pressed="false">
        Jane
      </button>
      <button id="clear-focus" type="button">Show all</button>
    </div>
  </section>

  <main>
    <aside id="scene-drawer" class="scene-drawer" aria-label="Scene list">
      <h2>Scenes</h2>
      <nav id="scene-list"></nav>
    </aside>

    <article id="script" class="script" aria-live="polite">
      <div class="loading">Loading script…</div>
    </article>
  </main>

  <button id="top-button" class="top-button" type="button" aria-label="Back to top">↑</button>

  <noscript>
    <p class="noscript">JavaScript is required to format the screenplay.</p>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
