<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111318">
  <meta name="description" content="Responsive rehearsal script viewer for Lakers Lodge">
  <title>Lakers Lodge — Rehearsal Script</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;600;700;800&family=Lora:wght@400;600;700&family=Merriweather:wght@400;700&family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;600;700&family=Source+Code+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong id="script-title">Lakers Lodge</strong>
      <span id="script-meta">Rehearsal script</span>
    </div>

    <div class="scene-jump">
      <button id="prev-scene" class="compact-button" type="button" aria-label="Previous scene">←</button>
      <select id="scene-select" aria-label="Jump to scene">
        <option value="">Choose a scene…</option>
      </select>
      <button id="next-scene" class="compact-button" type="button" aria-label="Next scene">→</button>
    </div>

    <button id="menu-toggle" class="compact-button menu-toggle" type="button"
            aria-expanded="false" aria-controls="controls-panel">
      Options
    </button>

    <section id="controls-panel" class="controls-panel" aria-label="Reading controls">
      <button id="theme-toggle" type="button">Dark</button>
      <button id="directions-toggle" type="button" aria-pressed="false">Hide directions</button>

      <label class="inline-control" for="font-size">
        <span>Size</span>
        <input id="font-size" type="range" min="16" max="28" value="20" step="1">
      </label>

      <label class="inline-control" for="font-family">
        <span>Font</span>
        <select id="font-family">
          <option value="Courier Prime">Courier Prime</option>
          <option value="Roboto Mono">Roboto Mono</option>
          <option value="IBM Plex Mono">IBM Plex Mono</option>
          <option value="Source Code Pro">Source Code Pro</option>
          <option value="Inter">Inter</option>
          <option value="Roboto">Roboto</option>
          <option value="Lora">Lora</option>
          <option value="Merriweather">Merriweather</option>
        </select>
      </label>

      <div class="line-focus" aria-label="Character highlighting">
        <button class="character-filter leon-filter" data-character="LEON" type="button" aria-pressed="false">Leon</button>
        <button class="character-filter jane-filter" data-character="JANE" type="button" aria-pressed="false">Jane</button>
        <button id="clear-focus" type="button">All</button>
      </div>
    </section>
  </header>

  <main>
    <article id="script" class="script" aria-live="polite">
      <div class="loading">Loading script…</div>
    </article>
  </main>

  <button id="top-button" class="top-button" type="button" aria-label="Back to top">↑</button>

  <noscript>
    <p class="noscript">JavaScript is required to format the screenplay.</p>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
